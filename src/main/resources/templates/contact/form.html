<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>問い合わせフォーム</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div class="container">
		<h1 class="title">問い合わせフォーム</h1>
		<form th:action="@{/contact/confirm}" method="post" th:object="${contactData}" 　novalidate>
			<div class="contact">
				<label for="name">名前</label>
				<input type="text" id="name" th:field="*{name}" placeholder="例):山田　太郎">
				<div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
			</div>
			<div class="contact">
				<label for="email">メールアドレス</label>
				<input type="email" id="email" th:field="*{email}" placeholder="例):test@gmail.com">
				<div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
			</div>
			<div class="contact">
				<label for="message">問い合わせ内容</label>
				<textarea type="text" id="message" th:field="*{message}" rows="5" placeholder="ご自由に記載してください"></textarea>
				<div class="error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></div>
			</div>
			<button type="submit" class="btn">確認画面へ</button>
			<a href="/posts" class="back">戻る</a>
		</form>
	</div>
</body>

</html>
